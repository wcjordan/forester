root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/forester"
  cmd = "go build -o ./tmp/forester ."
  delay = 1000
  exclude_dir = ["tmp", "docs", ".git"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
